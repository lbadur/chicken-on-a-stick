<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UP GROWTH — Student Business Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── HEADER ───────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-up">UP</span><span class="logo-growth">GROWTH</span>
        <span class="logo-tag">untuk siswa dan dari siswa</span>
      </a>
      <p class="header-sub">Temukan &amp; borong jualan teman kalian!</p>
    </div>
    <!-- decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </header>

  <!-- ── CATEGORY FILTER BAR ──────────────────────────────── -->
  <nav class="category-bar" id="categoryBar" role="navigation" aria-label="Filter by category"></nav>

  <!-- ── MAIN GRID ─────────────────────────────────────────── -->
  <main class="container">
    <div class="grid" id="businessGrid"></div>
    <p class="empty-msg" id="emptyMsg" hidden>No businesses in this category yet. Check back soon! 👀</p>
  </main>

  <!-- ── FOOTER ────────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>UP GROWTH &nbsp;|&nbsp; Website Made by @ibadur.dur &nbsp;|&nbsp; <span id="year"></span></p>
  </footer>

  <!-- scripts — load data first, then the rendering logic -->
  <script src="data/businesses.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
